<div class="layout">
  <header class="topbar">
    <a class="logo" routerLink="/">{{ title }}</a>
    <nav>
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
      <a routerLink="/recommendations" routerLinkActive="active">✦ For You</a>
      <a routerLink="/favsongs" routerLinkActive="active">Favorites</a>
      <a routerLink="/playlists" routerLinkActive="active">Playlists</a>
      <a routerLink="/profile" routerLinkActive="active">Profile</a>
    </nav>
    <div class="auth-actions">
      <div class="search-pill" [class.open]="searchOpen">
        <button class="btn btn-ghost icon-btn" type="button" (click)="toggleSearch()" title="Search songs">
          🔍
        </button>
        <input
          #headerSearchInput
          type="text"
          [(ngModel)]="searchQuery"
          name="searchQuery"
          placeholder="Search songs"
          (keydown.enter)="submitSearch()"
          (keydown.escape)="closeSearch()"
        />
      </div>
      @if (api.isAuthenticated) {
        <button class="btn btn-ghost" type="button" (click)="logout()">Logout</button>
      } @else {
        <a class="btn btn-ghost" routerLink="/auth" routerLinkActive="active">Login</a>
      }
    </div>
  </header>

  <main>
    <router-outlet />
  </main>
</div>

<!-- Global music player widget — floats over every page -->
<app-music-player-widget />
