<div class="layout">
  <header class="topbar">
    <a class="logo" routerLink="/">{{ title }}</a>
    <nav>
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
      <a routerLink="/tracks" routerLinkActive="active">Tracks</a>
      <a routerLink="/playlists" routerLinkActive="active">Playlists</a>
      <a routerLink="/profile" routerLinkActive="active">Profile</a>
      <a routerLink="/auth" routerLinkActive="active">Auth</a>
    </nav>
    <button class="btn btn-ghost" type="button" (click)="logout()" [disabled]="!api.isAuthenticated">
      Logout
    </button>
  </header>

  <main>
    <router-outlet />
  </main>
</div>
